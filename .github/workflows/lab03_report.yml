name: upwind_convergence

on: [push]

jobs:
  build_and_run_notebook:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repository
      uses: actions/checkout@v2

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y pandoc inkscape texlive-xetex
        pip install --upgrade pip
        pip install nbconvert ipykernel pint matplotlib scipy numpy

    - name: Execute and convert notebook to PDF
      run: |
        jupyter nbconvert --execute "convergence_analysis_ of_upwind.ipynb" \
          --to pdf --output "convergence_analysis_ of_upwind.pdf"

    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      with:
        name: upwind_report_pdf
        path: "convergence_analysis_ of_upwind.pdf"
